<!DOCTYPE html>
<html>
<head>
    <title>Data Entry</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h2>Enter Sales & Inventory Data</h2>

    <form method="POST">
        <input type="date" name="date" required><br><br>
        <input type="text" name="product" placeholder="Product Name" required><br><br>
        <input type="text" name="category" placeholder="Category" required><br><br>
        <input type="number" name="price" placeholder="Price" required><br><br>
        <input type="number" name="quantity" placeholder="Quantity Sold" required><br><br>
        <input type="number" name="stock" placeholder="Stock Left" required><br><br>

        <button type="submit">Submit</button>
    </form>

    <br>
    <a href="/dashboard">Go to Dashboard</a> |
    <a href="/logout">Logout</a>
</body>
</html>
